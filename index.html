<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda · Ieadern Parque Verde</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --g1:#00C47A;--g2:#00E896;--gold:#F5C347;--coral:#FF6B6B;
  --bg:#071A10;--card:rgba(255,255,255,.07);--border:rgba(255,255,255,.11);
  --text:#EDFFF5;--muted:rgba(255,255,255,.42);
}
body{
  background:#071A10;
  color:#EDFFF5 !important;
  background-image:radial-gradient(ellipse 80% 60% at 85% 5%,rgba(0,196,122,.13),transparent),
                   radial-gradient(ellipse 50% 40% at 5% 95%,rgba(245,195,71,.06),transparent);
  min-height:100vh;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
  color:#EDFFF5;padding:16px;display:flex;flex-direction:column;align-items:center;gap:12px;
}

.wrap{position:relative;z-index:1;width:100%;max-width:700px;display:flex;flex-direction:column;gap:12px}

/* ── HEADER ── */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;
  background:var(--card);border:1px solid var(--border);border-radius:20px;backdrop-filter:blur(24px)}
.logo-wrap{display:flex;align-items:center;gap:12px}
/* transparent logo — no white box */
.logo-box{width:46px;height:46px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-box img{width:100%;height:100%;object-fit:contain;filter:brightness(0) invert(1)}
.ch-name{font-family:'Georgia',serif;font-size:17px;font-weight:900;color:#fff;line-height:1.1}
.ch-sub{font-size:10px;color:rgba(255,255,255,.42);font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.hdr-badge{background:linear-gradient(135deg,var(--g1),var(--g2));color:#071A10;
  font-size:10px;font-weight:800;padding:5px 13px;border-radius:18px;letter-spacing:.4px}

/* ── TABS ── */
.tabs{display:flex;gap:5px;padding:5px;background:var(--card);border:1px solid var(--border);border-radius:15px;backdrop-filter:blur(20px)}
.tab{flex:1;padding:10px 8px;border:none;border-radius:10px;background:transparent;
  color:rgba(255,255,255,.42);font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:12px;font-weight:700;
  cursor:pointer;transition:all .2s}
.tab.on{background:linear-gradient(135deg,var(--g1),var(--g2));color:#071A10;box-shadow:0 4px 16px rgba(0,196,122,.35)}
.tab:not(.on):hover{color:#fff;background:rgba(255,255,255,.06)}

/* ── NAV ── */
.nav{display:flex;align-items:center;gap:10px}
.nbtn{width:40px;height:40px;border-radius:10px;background:var(--card);border:1px solid var(--border);
  color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .18s;flex-shrink:0}
.nbtn:hover{background:rgba(255,255,255,.12)}
.ntitle{font-family:'Georgia',serif;font-size:20px;font-weight:900;text-align:center;flex:1;color:#fff !important}

/* ── CARD ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:24px;backdrop-filter:blur(24px);overflow:hidden}

/* ── share btn inside header area ── */
.share-row{display:flex;align-items:center;justify-content:space-between;padding:20px 22px 0}
.mbig{font-family:'Georgia',serif;font-size:46px;font-weight:900;color:#fff;line-height:1}
.bshare{display:flex;align-items:center;gap:6px;padding:8px 16px;
  background:linear-gradient(135deg,var(--g1),var(--g2));border:none;border-radius:20px;
  color:#071A10;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:11px;font-weight:800;cursor:pointer;
  transition:opacity .18s;flex-shrink:0}
.bshare:hover{opacity:.85}
.mlabel{font-size:10px;color:var(--g2);font-weight:700;text-transform:uppercase;letter-spacing:1.4px;
  display:flex;align-items:center;gap:5px;padding:8px 22px 16px}
.mlabel::before{content:'';width:5px;height:5px;background:var(--g2);border-radius:50%}

/* ── MONTHLY GRID ── */
.cgrid{padding:0 12px 18px}
.wkrow{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:5px}
.wkd{text-align:center;font-size:9px;font-weight:800;color:rgba(255,255,255,.42);padding:5px 0;text-transform:uppercase;letter-spacing:.6px}
.wkd.we{color:var(--g2)}
.dgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.dc{min-height:72px;border-radius:12px;padding:5px 4px 4px;cursor:pointer;
  transition:all .13s;border:1px solid transparent}
.dc:not(.empty):hover{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.1)}
.dc.empty{pointer-events:none}
.dc.wd{background:rgba(0,232,150,.03)}
.dnum{font-family:'Georgia',serif;font-size:14px;font-weight:700;
  display:inline-flex;align-items:center;justify-content:center;
  width:26px;height:26px;border-radius:8px;margin-bottom:3px;color:rgba(255,255,255,.8)}
.dnum.tod{background:var(--g2);color:#071A10}
.chip{display:block;font-size:8px;font-weight:700;padding:2px 4px;border-radius:4px;
  margin-bottom:2px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4}
.chip:hover{filter:brightness(1.2)}

/* ── WEEKLY ── */
.week-share-hdr{display:flex;align-items:center;justify-content:space-between;padding:18px 22px 8px}
.wsec-lbl{font-family:'Georgia',serif;font-size:20px;font-weight:900;color:rgba(255,255,255,.55)}
.wrows{}
.wrow{display:flex;align-items:stretch;border-bottom:1px solid rgba(255,255,255,.05)}
.wrow:last-child{border-bottom:none}
.wlbl{width:86px;flex-shrink:0;padding:13px 10px 13px 20px;border-right:1px solid rgba(255,255,255,.05)}
.wdn{font-size:9px;font-weight:800;color:rgba(255,255,255,.42);text-transform:uppercase;letter-spacing:.6px}
.wdnum{font-family:'Georgia',serif;font-size:28px;font-weight:900;line-height:1;margin-top:3px;color:#fff}
.wdnum.tod{color:var(--g2)}
.wevs{flex:1;padding:12px 16px 12px 12px;display:flex;flex-direction:column;gap:6px}
.padd{display:inline-flex;align-items:center;gap:4px;color:rgba(255,255,255,.42);font-size:11px;
  font-weight:600;cursor:pointer;padding:4px 9px;border-radius:7px;
  border:1px dashed rgba(255,255,255,.13);background:transparent;transition:all .13s;width:fit-content}
.padd:hover{color:#fff;border-color:rgba(255,255,255,.28)}
.ps{display:inline-flex;align-items:center;gap:6px;border-radius:9px;padding:5px 11px;
  font-size:11px;font-weight:700;width:fit-content;cursor:pointer}
.ps:hover{filter:brightness(1.15)}

/* ── ANNOUNCE ── */
.ann-view{padding:18px 20px 24px}
.ann-ftit{font-size:15px;font-weight:800;margin-bottom:14px;color:var(--g2)}
.flabel{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.9px;
  color:rgba(255,255,255,.42);display:block;margin-bottom:5px;margin-top:12px}
.fi{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.11);
  border-radius:11px;color:#fff;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
  font-size:13px;font-weight:500;padding:11px 13px;outline:none;transition:border .13s;resize:none}
.fi:focus{border-color:var(--g2)}
select.fi option{background:#0A1F10}
.factions{margin-top:16px}
.pbtn{width:100%;padding:12px;background:linear-gradient(135deg,var(--g1),var(--g2));
  border:none;border-radius:11px;color:#071A10;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
  font-size:13px;font-weight:800;cursor:pointer}
.pbtn:hover{opacity:.88}
.alist{margin-top:20px;display:flex;flex-direction:column;gap:10px}
.acard{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);
  border-radius:14px;padding:14px 16px}
.actit{font-size:14px;font-weight:800;color:#fff;margin-bottom:5px}
.actxt{font-size:12px;color:rgba(255,255,255,.65);line-height:1.65}
.acbot{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-top:11px}
.acdate{font-size:10px;font-weight:700;color:rgba(255,255,255,.42);letter-spacing:.5px}
.acacts{display:flex;gap:7px}
.bsh{display:flex;align-items:center;gap:5px;padding:7px 14px;
  background:linear-gradient(135deg,var(--g1),var(--g2));border:none;border-radius:8px;
  color:#071A10;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:11px;font-weight:800;cursor:pointer}
.bdel{padding:7px 12px;background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.28);
  border-radius:8px;color:#FB7185;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:11px;font-weight:700;cursor:pointer}
.empt{text-align:center;color:rgba(255,255,255,.42);font-size:13px;font-weight:600;padding:28px 0;opacity:.5}
.atdot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px}

/* ── EVENT MODAL ── */
.moverlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(12px);
  display:flex;align-items:center;justify-content:center;z-index:100;
  opacity:0;pointer-events:none;transition:opacity .2s;padding:18px}
.moverlay.open{opacity:1;pointer-events:all}
.modal{background:#0A1F10;border:1px solid rgba(0,196,122,.2);border-radius:22px;
  padding:24px;width:360px;max-width:100%;
  transform:translateY(18px) scale(.96);transition:transform .25s}
.moverlay.open .modal{transform:translateY(0) scale(1)}
.mtit{font-family:'Georgia',serif;font-size:19px;font-weight:900;margin-bottom:15px;color:#fff}
.crow{display:flex;gap:9px;flex-wrap:wrap;margin-top:5px}
.cc{width:28px;height:28px;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:all .13s}
.cc:hover{transform:scale(1.12)}
.cc.sel{border-color:#fff;transform:scale(1.08)}
.macts{display:flex;gap:8px;margin-top:19px}
.mc{flex:1;padding:11px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.11);
  border-radius:10px;color:#fff;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:13px;font-weight:700;cursor:pointer}
.ms{flex:1;padding:11px;background:linear-gradient(135deg,var(--g1),var(--g2));border:none;
  border-radius:10px;color:#071A10;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:13px;font-weight:800;cursor:pointer}
.md{padding:11px 13px;background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.28);
  border-radius:10px;color:#FB7185;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:13px;font-weight:700;cursor:pointer}

/* ── SHARE MODAL ── */
.smoverlay{position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(16px);
  display:flex;align-items:center;justify-content:center;z-index:200;
  opacity:0;pointer-events:none;transition:opacity .22s;padding:18px}
.smoverlay.open{opacity:1;pointer-events:all}
.smodal{background:#0A1F10;border:1px solid rgba(0,196,122,.22);border-radius:22px;
  padding:22px;width:400px;max-width:100%;
  transform:translateY(18px) scale(.95);transition:transform .26s;max-height:90vh;overflow-y:auto}
.smoverlay.open .smodal{transform:translateY(0) scale(1)}
.smtit{font-family:'Georgia',serif;font-size:17px;font-weight:900;margin-bottom:14px;color:var(--g2)}
.preview-wrap{background:rgba(0,0,0,.4);border-radius:14px;overflow:hidden;margin-bottom:14px;
  display:flex;align-items:center;justify-content:center;min-height:180px}
#preview-img{max-width:100%;display:none}
.prev-load{color:rgba(255,255,255,.42);font-size:13px;font-weight:600;padding:28px}
.sact{display:flex;gap:8px}
.sdl{flex:1;padding:12px;background:linear-gradient(135deg,var(--g1),var(--g2));border:none;
  border-radius:10px;color:#071A10;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:13px;font-weight:800;cursor:pointer}
.scl{padding:12px 16px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.11);
  border-radius:10px;color:#fff;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:13px;font-weight:700;cursor:pointer}

/* ═══════════════════════════════════
   SHARE CARD — off-screen canvas target
   ═══════════════════════════════════ */
#share-card{
  position:absolute;left:-9999px;top:-9999px;
  width:540px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
}

/* base layout */
.sc{width:540px;background:#071A10;border-radius:0;overflow:hidden;position:relative}

/* gradient mesh background */
.sc-bg{
  position:absolute;inset:0;pointer-events:none;
  background:
    radial-gradient(ellipse 70% 55% at 90% 0%,rgba(0,196,122,.22),transparent),
    radial-gradient(ellipse 50% 45% at 5% 100%,rgba(245,195,71,.12),transparent),
    radial-gradient(ellipse 40% 35% at 50% 50%,rgba(0,196,122,.05),transparent);
}

/* decorative ring top-right */
.sc-ring{
  position:absolute;top:-60px;right:-60px;width:220px;height:220px;
  border-radius:50%;border:1px solid rgba(0,196,122,.18);pointer-events:none;
}
.sc-ring2{
  position:absolute;top:-30px;right:-30px;width:140px;height:140px;
  border-radius:50%;border:1px solid rgba(0,196,122,.12);pointer-events:none;
}

.sc-inner{position:relative;z-index:1;padding:36px 36px 28px}

/* header row */
.sc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px}
.sc-logo-wrap{display:flex;align-items:center;gap:12px}
.sc-logo{width:44px;height:44px;display:flex;align-items:center;justify-content:center}
.sc-logo img{width:100%;height:100%;object-fit:contain;filter:brightness(0) invert(1)}
.sc-church{font-family:'Georgia',serif;font-size:22px;font-weight:900;color:#fff;letter-spacing:-.3px}
.sc-church-sub{font-size:10px;color:rgba(255,255,255,.4);font-weight:600;
  text-transform:uppercase;letter-spacing:1.2px;margin-top:2px}
.sc-top-tag{
  background:rgba(0,196,122,.15);border:1px solid rgba(0,196,122,.3);
  color:#00E896;font-size:10px;font-weight:800;padding:5px 12px;border-radius:20px;
  text-transform:uppercase;letter-spacing:.8px}

/* month hero */
.sc-month{font-family:'Georgia',serif;font-size:64px;font-weight:900;color:#fff;
  line-height:.9;letter-spacing:-2px;margin-bottom:4px}
.sc-month-sub{font-size:12px;color:rgba(255,255,255,.4);font-weight:600;
  letter-spacing:1px;text-transform:uppercase;margin-bottom:24px;
  display:flex;align-items:center;gap:8px}
.sc-month-sub::before{content:'';flex:1;height:1px;background:rgba(255,255,255,.1)}

/* event list */
.sc-ev-list{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.sc-ev{
  display:flex;align-items:center;gap:14px;padding:13px 16px;
  background:rgba(255,255,255,.06);border-radius:14px;
  border-left:3px solid;}
.sc-ev-left{display:flex;flex-direction:column;align-items:center;min-width:36px}
.sc-ev-day{font-family:'Georgia',serif;font-size:26px;font-weight:900;color:#fff;line-height:1}
.sc-ev-wk{font-size:9px;font-weight:800;color:rgba(255,255,255,.4);
  text-transform:uppercase;letter-spacing:.6px;margin-top:1px}
.sc-ev-divider{width:1px;background:rgba(255,255,255,.1);align-self:stretch;margin:0 2px}
.sc-ev-info{flex:1}
.sc-ev-name{font-size:15px;font-weight:800;color:#fff;line-height:1.2}
.sc-ev-time{font-size:11px;font-weight:600;color:rgba(255,255,255,.5);margin-top:3px}

/* no-events placeholder */
.sc-noev{text-align:center;padding:22px 0;color:rgba(255,255,255,.3);font-size:13px;font-weight:600}

/* week-view rows */
.sc-wk-row{display:flex;align-items:flex-start;gap:14px;padding:13px 16px;
  background:rgba(255,255,255,.06);border-radius:14px;margin-bottom:8px}
.sc-wk-date{display:flex;flex-direction:column;align-items:center;min-width:42px}
.sc-wk-num{font-family:'Georgia',serif;font-size:28px;font-weight:900;color:#fff;line-height:1}
.sc-wk-name{font-size:9px;font-weight:800;color:rgba(255,255,255,.4);
  text-transform:uppercase;letter-spacing:.6px;margin-top:1px}
.sc-wk-div{width:1px;background:rgba(255,255,255,.1);align-self:stretch}
.sc-wk-evs{flex:1;display:flex;flex-direction:column;gap:4px;padding:2px 0}
.sc-wk-ev{font-size:13px;font-weight:700}

/* announce card */
.sc-ann-type{display:inline-flex;align-items:center;gap:7px;padding:5px 14px;
  border-radius:20px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;
  margin-bottom:16px}
.sc-ann-title{font-family:'Georgia',serif;font-size:38px;font-weight:900;color:#fff;
  line-height:1.05;letter-spacing:-1px;margin-bottom:14px}
.sc-ann-text{font-size:14px;color:rgba(255,255,255,.72);line-height:1.75}

/* footer */
.sc-footer{
  margin-top:24px;padding-top:16px;
  border-top:1px solid rgba(255,255,255,.07);
  display:flex;align-items:center;justify-content:space-between}
.sc-footer-name{font-size:11px;font-weight:700;color:rgba(255,255,255,.35);letter-spacing:.5px}
.sc-footer-badge{
  background:linear-gradient(135deg,#00C47A,#00E896);color:#071A10;
  font-size:9px;font-weight:800;padding:4px 12px;border-radius:14px;letter-spacing:.5px;
  text-transform:uppercase}

.hint{font-size:11px;color:rgba(255,255,255,.42);text-align:center;opacity:.55}
</style>
</head>
